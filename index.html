<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梅花投資型彩券線上開獎系統</title>
  <style>
    :root{
      --bg:#f3f3f1;
      --card:#ffffff;
      --text:#1f2124;
      --muted:#6a6f75;
      --line:#ddddda;
      --accent:#f0a12b;
      --accent2:#db8a10;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    }
    .wrap{
      width:min(900px,calc(100% - 28px));
      margin:24px auto 18px;
    }
    .card{
      background:var(--card);
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.04);
    }
    .section{
      padding:24px 22px;
    }
    .section + .section{
      border-top:1px solid rgba(0,0,0,.06);
    }
    h1{
      margin:0 0 20px;
      font-size:clamp(24px,6vw,42px);
      line-height:1.12;
      letter-spacing:.02em;
    }
    .label{
      display:block;
      font-size:14px;
      color:var(--muted);
      margin:0 0 10px;
    }
    .period-row{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      font-weight:800;
      font-size:22px;
      margin-bottom:18px;
    }
    .period-row input{
      width:180px;
      border:none;
      border-bottom:3px solid #9a9a97;
      background:transparent;
      text-align:center;
      padding:8px 6px 6px;
      font-size:24px;
      font-weight:800;
      color:var(--text);
      outline:none;
      border-radius:0;
    }
    select,button{
      width:100%;
      appearance:none;
      border-radius:16px;
      border:1px solid #d7d7d4;
      background:#fff;
      color:var(--text);
      padding:16px 18px;
      font-size:18px;
      outline:none;
    }
    button{
      margin-top:18px;
      font-weight:900;
      border:none;
      background:linear-gradient(180deg,#f6b13e 0%,#ec9a18 100%);
      box-shadow:0 8px 18px rgba(240,161,43,.25);
      cursor:pointer;
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
      box-shadow:none;
    }
    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:0 0 18px;
    }
    .chip{
      background:#f5f5f3;
      border:1px solid rgba(0,0,0,.05);
      color:#333;
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
    }
    .draw-area{
      min-height:150px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:20px;
      background:#fcfcfb;
      padding:16px;
    }
    .balls{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:flex-start;
      min-height:90px;
    }
    .ball{
      width:70px;
      height:70px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      color:#111;
      background:radial-gradient(circle at 30% 28%, #ffd897 0%, #f6b650 38%, #e99a20 72%, #d8830d 100%);
      box-shadow:inset -8px -10px 16px rgba(0,0,0,.18), inset 8px 8px 12px rgba(255,255,255,.28), 0 6px 12px rgba(0,0,0,.12);
      transform:scale(.5);
      opacity:0;
      animation:pop .38s cubic-bezier(.18,1.25,.38,1) forwards;
      position:relative;
    }
    .ball::after{
      content:"";
      width:20px;height:9px;border-radius:50%;
      background:rgba(255,255,255,.4);
      position:absolute;top:13px;left:17px;
      transform:rotate(-16deg);
    }
    @keyframes pop{
      0%{transform:scale(.5) translateY(10px);opacity:0}
      100%{transform:scale(1) translateY(0);opacity:1}
    }
    .pool-box{
      margin-top:18px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:20px;
      background:linear-gradient(180deg,#fafaf9 0%,#f1f1ee 100%);
      padding:14px 14px 16px;
    }
    .status{
      color:var(--muted);
      font-size:15px;
      margin:0 0 12px;
    }
    .pool{
      min-height:126px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:flex-start;
    }
    .mini-ball{
      width:26px;
      height:26px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 28%, #ffd897 0%, #f6b650 38%, #e99a20 72%, #d8830d 100%);
      box-shadow:inset -4px -5px 8px rgba(0,0,0,.14), inset 4px 4px 5px rgba(255,255,255,.25);
      opacity:.95;
      transition:transform .22s ease, opacity .22s ease, filter .22s ease;
    }
    .pool.shake .mini-ball:nth-child(3n){transform:translate(2px,-2px)}
    .pool.shake .mini-ball:nth-child(4n){transform:translate(-2px,2px)}
    .pool.shake .mini-ball:nth-child(5n){transform:translate(1px,3px)}
    .pool.shake .mini-ball:nth-child(6n){transform:translate(-1px,-3px)}
    .mini-ball.off{
      opacity:.12;
      filter:grayscale(1);
      transform:scale(.82);
    }
    .footer{
      text-align:center;
      color:#5b5b58;
      padding:16px 0 4px;
      font-size:13px;
      letter-spacing:.08em;
    }
    @media (max-width:640px){
      .section{padding:22px 18px}
      .ball{width:60px;height:60px;font-size:24px}
      .period-row{font-size:20px}
      .period-row input{width:150px;font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="section">
        <h1>梅花投資型彩券線上開獎系統</h1>

        <label class="label" for="periodInput">期數設定</label>
        <div class="period-row">
          <span>第</span>
          <input id="periodInput" type="text" inputmode="numeric" placeholder="______" />
          <span>期</span>
        </div>

        <label class="label" for="modeSelect">開獎模式</label>
        <select id="modeSelect">
          <option value="5">普通週開獎（開出5碼）</option>
          <option value="10">加碼週開獎（開出10碼）</option>
          <option value="20">春節特別開獎（開出20碼）</option>
        </select>

        <button id="drawButton" type="button">開始開獎</button>
      </div>

      <div class="section">
        <div class="meta">
          <div class="chip" id="periodChip">目前期數：未填寫</div>
          <div class="chip" id="modeChip">本次開獎：普通週開獎</div>
          <div class="chip" id="countChip">應開出號碼：5碼</div>
        </div>

        <div class="draw-area">
          <div class="balls" id="balls"></div>

          <div class="pool-box">
            <p class="status" id="statusText">狀態：待機中</p>
            <div class="pool" id="pool"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">MEIBEI Studio</div>
  </div>

  <script>
    const periodInput = document.getElementById('periodInput');
    const modeSelect = document.getElementById('modeSelect');
    const drawButton = document.getElementById('drawButton');
    const periodChip = document.getElementById('periodChip');
    const modeChip = document.getElementById('modeChip');
    const countChip = document.getElementById('countChip');
    const ballsEl = document.getElementById('balls');
    const poolEl = document.getElementById('pool');
    const statusText = document.getElementById('statusText');

    let drawing = false;

    function updateHeader() {
      const period = periodInput.value.trim();
      const count = Number(modeSelect.value);
      const text = modeSelect.options[modeSelect.selectedIndex].text.split('（')[0];
      periodChip.textContent = period ? `目前期數：第 ${period} 期` : '目前期數：未填寫';
      modeChip.textContent = `本次開獎：${text}`;
      countChip.textContent = `應開出號碼：${count}碼`;
    }

    function buildPool() {
      poolEl.innerHTML = '';
      for (let i = 1; i <= 50; i++) {
        const b = document.createElement('div');
        b.className = 'mini-ball';
        b.dataset.num = i;
        poolEl.appendChild(b);
      }
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function beep(freq = 720, duration = 0.08) {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        if (!window._audioCtx) window._audioCtx = new AudioContextClass();
        const ac = window._audioCtx;
        if (ac.state === 'suspended') ac.resume();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.value = 0.03;
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start();
        osc.stop(ac.currentTime + duration);
      } catch (e) {}
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function markPoolOff(num) {
      const target = poolEl.querySelector(`[data-num="${num}"]`);
      if (target) target.classList.add('off');
    }

    function addBall(num) {
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.textContent = num;
      ballsEl.appendChild(ball);
    }

    async function runDraw() {
      if (drawing) return;
      drawing = true;
      drawButton.disabled = true;
      updateHeader();

      ballsEl.innerHTML = '';
      buildPool();
      poolEl.classList.add('shake');

      const count = Number(modeSelect.value);
      const nums = shuffle(Array.from({length: 50}, (_, i) => i + 1)).slice(0, count);

      statusText.textContent = '狀態：開獎進行中';

      for (let i = 0; i < nums.length; i++) {
        await sleep(800);
        const num = nums[i];
        markPoolOff(num);
        addBall(num);
        beep(700 + (i % 6) * 60, 0.08);
        statusText.textContent = `狀態：第 ${i + 1} 顆號碼已開出`;
      }

      poolEl.classList.remove('shake');
      statusText.textContent = '狀態：本期開獎完成';
      drawButton.disabled = false;
      drawing = false;
    }

    periodInput.addEventListener('input', updateHeader);
    modeSelect.addEventListener('change', updateHeader);
    drawButton.addEventListener('click', runDraw);

    updateHeader();
    buildPool();
  </script>
</body>
</html>
